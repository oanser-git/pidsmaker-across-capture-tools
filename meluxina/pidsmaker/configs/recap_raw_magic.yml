job:
  script: meluxina/pidsmaker/run_array.sbatch
  account: p201223
  partition: gpu
  qos: default
  cpus_per_task: 7
  mem: 96G
  time: 04:00:00
  output: run_logs/%x-%A_%a.out
  error: run_logs/%x-%A_%a.err
  job_name: pids_magic_recap
  extra_args:
