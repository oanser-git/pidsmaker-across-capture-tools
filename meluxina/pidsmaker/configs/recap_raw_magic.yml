  MELUXINA_PIDSMAKER_SWEEP: ${P_EDR_ROOT}/meluxina/pidsmaker/sweeps/recap_raw_magic_default.yml
  MELUXINA_PIDSMAKER_IMAGE: ${P_EDR_ROOT}/containers/pidsmaker-pids.sif
  ORANGE_EXPORT_ROOT: /mnt/tier2/project/p201223/pidsmaker-across-capture-tools/capture_export/pidsmaker_export
