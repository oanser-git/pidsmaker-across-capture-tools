job:
  script: meluxina/export_only.sbatch
  account: p201223
  partition: cpu
  qos: default
  cpus_per_task: 256
  mem: 480G
  time: 2-00:00:00
  output: run_logs/%x-%j.out
  error: run_logs/%x-%j.err
  job_name: export_recap_4m

env:
  HPO_IMAGE: ${P_EDR_ROOT}/containers/export-prep.sif
  MELUXINA_IMAGE_SOURCE: docker://pytorch/pytorch:1.13.1-cuda11.6-cudnn8-runtime
  MELUXINA_AUTO_BUILD_IMAGE: 1
  MELUXINA_EXPORT_WORKERS: 16
  MELUXINA_EXPORT_TOOLS: recap
  PIDSMAKER_EXPORT_WINDOW_SIZE_SECONDS: 240
  PIDSMAKER_EXPORT: ${P_EDR_ROOT}/capture_export/pidsmaker_export_variants/recap_raw/window_4m
