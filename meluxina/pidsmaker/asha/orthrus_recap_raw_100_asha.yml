name: orthrus_recap_raw_100_asha
results_root: ${P_EDR_ROOT}/meluxina/pidsmaker/asha_runs/orthrus_recap_raw_100
metric: adp_score
mode: maximize
promotion_policy: sync
reduction_factor: 2
poll_seconds: 120
submit_accounts:
- p201223
- p201219
submit_chunk_size: 100
max_submit_jobs_per_account: 100
array_concurrency: 100
sbatch_script: ${P_EDR_ROOT}/meluxina/pidsmaker/run_array.sbatch
sbatch_options:
  account: p201223
  partition: gpu
  qos: default
  mem: 320G
  gres: gpu:1
  cpus_per_task: 7
  output: ${P_EDR_ROOT}/run_logs/%x-%A_%a.out
  error: ${P_EDR_ROOT}/run_logs/%x-%A_%a.err
export_env:
  MELUXINA_PIDSMAKER_IMAGE: ${P_EDR_ROOT}/containers/pidsmaker-pids-psycopg2.sif
  MELUXINA_PIDSMAKER_AUTO_BUILD_IMAGE: 1
rungs:
- name: r0_e1
  sweep: ${P_EDR_ROOT}/meluxina/pidsmaker/sweeps/asha/orthrus_recap_raw_100_asha_r0_e1.yml
  results_dir: ${P_EDR_ROOT}/meluxina/pidsmaker/asha_runs/orthrus_recap_raw_100/r0_e1
  tag: orthrus_recap_raw100_r0_e1
  job_name: orthrus_recap_raw100_r0
  sbatch_options:
    time: 01:00:00
- name: r1_e2
