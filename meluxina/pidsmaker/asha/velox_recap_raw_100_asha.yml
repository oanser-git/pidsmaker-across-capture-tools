mode: maximize
promotion_policy: sync
reduction_factor: 3
poll_seconds: 120
array_concurrency: 81
sbatch_script: ${P_EDR_ROOT}/meluxina/pidsmaker/run_array.sbatch
sbatch_options:
  account: p201223
  partition: gpu
  qos: default
  mem: 180G
  gres: gpu:1
  cpus_per_task: 7
  output: ${P_EDR_ROOT}/run_logs/%x-%A_%a.out
  error: ${P_EDR_ROOT}/run_logs/%x-%A_%a.err
export_env:
  MELUXINA_PIDSMAKER_AUTO_BUILD_IMAGE: 1
rungs:
